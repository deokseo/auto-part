<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальний пошук та аналітика автозапчастин</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0f1d;
            color: #f1f5f9;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0a0f1d 70%);
        }

        h1 {
            background: linear-gradient(to right, #ff7300, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            font-size: 32px;
            text-align: center;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 20px rgba(255, 115, 0, 0.15);
        }

        .search-box {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 750px;
            margin-bottom: 50px;
            background: rgba(30, 41, 59, 0.5);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 115, 0, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            background-color: #0f172a;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            background-color: #1e293b;
        }

        button {
            padding: 16px 36px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        button:active {
            transform: translateY(1px);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(20, 30, 54, 0.6);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(255, 115, 0, 0.3);
        }

        .card h2 {
            font-size: 16px;
            color: #ff7300;
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .info-text {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .offer-item {
            background: #0b111e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .offer-item h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 600;
        }

        .offer-item h3 a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
        }

        .offer-item h3 a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .offer-item p {
            margin: 0 0 16px 0;
            font-size: 13px;
            color: #94a3b8;
        }

        .meta-row {
            font-size: 14px;
            font-weight: bold;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #1e293b;
            padding-top: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255,255,255,0.03);
        }

        .date-text {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h1>Глобальний пошук та аналітика автозапчастин</h1>

    <div class="search-box">
        <input type="text" id="queryInput" placeholder="Наприклад: Передній бампер Мерседес 240 1996 р.в.">
        <button id="actionBtn" onclick="doSearch()">Знайти</button>
    </div>

    <div class="container">
        <div class="card">
            <h2>🌐 Знайдені пропозиції (Україна та Європа)</h2>
            <div id="offersResult" class="info-text">Введіть запит для пошуку пропозицій на ринку...</div>
        </div>

        <div class="card">
            <h2>🔧 # Аналітика та розшифровка OEM</h2>
            <div id="aiResult" class="info-text">Тут з'явиться детальний аналіз деталі та розшифровка її кодів від ШІ...</div>
        </div>
    </div>

    <script>
        async function doSearch() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('actionBtn');
            const offersResult = document.getElementById('offersResult');
            const aiResult = document.getElementById('aiResult');

            btn.disabled = true;
            btn.style.background = '#475569';
            btn.style.boxShadow = 'none';
            btn.innerText = 'Пошук...';
            offersResult.innerHTML = '<div style="color: #64748b; font-style: italic;">Сканування баз даних...</div>';
            aiResult.innerHTML = '<div style="color: #64748b; font-style: italic;">Генерація ШІ аналітики...</div>';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                aiResult.innerText = data.ai_text || 'Не вдалося отримати аналітику.';

                offersResult.innerHTML = '';
                if (data.offers && data.offers.length > 0) {
                    data.offers.forEach(offer => {
                        const div = document.createElement('div');
                        div.className = 'offer-item';

                        let stockColor = '#ef4444'; 
                        let glowStyle = '0 0 10px rgba(239, 68, 68, 0.5)';
                        
                        if (offer.stock === 'В наявності') {
                            stockColor = '#10b981';
                            glowStyle = '0 0 10px rgba(16, 185, 129, 0.5)';
                        } else if (offer.stock === 'Під замовлення') {
                            stockColor = '#f59e0b';
                            glowStyle = '0 0 10px rgba(245, 158, 11, 0.5)';
                        }

                        div.innerHTML = `
                            <h3><a href="${offer.link}" target="_blank">${offer.title}</a></h3>
                            <p>${offer.snippet}</p>
                            <div class="meta-row">
                                <span style="color: #ff7300;">Ціна: ${offer.price}</span>
                                <span class="status-badge" style="color: ${stockColor}; text-shadow: ${glowStyle};">
                                    <span style="color: ${stockColor}; text-shadow: ${glowStyle};">●</span> ${offer.stock}
                                </span>
                            </div>
                            <div class="date-text">📅 Публікація: ${offer.date}</div>
                        `;
                        offersResult.appendChild(div);
                    });
                } else {
                    offersResult.innerHTML = '<div style="color: #ef4444;">Нічого не знайдено за цим запитом. Спробуйте змінити слова.</div>';
                }

            } catch (e) {
                offersResult.innerHTML = '<div style="color: #ef4444;">Помилка з\'єднання.</div>';
                aiResult.innerHTML = '<div style="color: #ef4444;">Помилка з\'єднання.</div>';
            } finally {
                btn.disabled = false;
                btn.style.background = 'linear-gradient(135deg, #2563eb, #1d4ed8)';
                btn.style.boxShadow = '0 4px 15px rgba(37, 99, 235, 0.4)';
                btn.innerText = 'Знайти';
            }
        }
    </script>
</body>
</html>
