<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук та аналітика автозапчастин</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a2332;
            color: #fff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff7300;
            margin-bottom: 30px;
            font-size: 26px;
            text-align: center;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 700px;
            margin-bottom: 40px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 6px;
            border: 1px solid #2e3d52;
            background-color: #242f41;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        button {
            padding: 14px 28px;
            border-radius: 6px;
            border: none;
            background-color: #2563eb;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: #202b3c;
            border-radius: 8px;
            padding: 25px;
            border: 1px solid #2d3b50;
        }

        .card h2 {
            font-size: 16px;
            color: #ff7300;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #2d3b50;
            padding-bottom: 10px;
        }

        .info-text {
            color: #8fa0b5;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .offer-item {
            background-color: #171f2b;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #243144;
        }

        .offer-item h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
        }

        .offer-item h3 a {
            color: #3b82f6;
            text-decoration: none;
        }

        .offer-item h3 a:hover {
            text-decoration: underline;
        }

        .offer-item p {
            margin: 0 0 12px 0;
            font-size: 13px;
            color: #7c8ba1;
        }

        .meta-row {
            font-size: 13px;
            font-weight: bold;
            color: #ff7300;
        }

        .date-text {
            font-size: 11px;
            color: #56667a;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <h1>Пошук та аналітика автозапчастин</h1>

    <div class="search-box">
        <input type="text" id="queryInput" placeholder="Наприклад: Передній бампер Мерседес 240 1996 р.в.">
        <button id="actionBtn" onclick="doSearch()">Знайти</button>
    </div>

    <div class="container">
        <div class="card">
            <h2>🌐 Знайдені пропозиції (Україна та Європа)</h2>
            <div id="offersResult" class="info-text">Введіть запит для пошуку пропозицій на ринку...</div>
        </div>

        <div class="card">
            <h2>🔧 Аналітика та розшифровка OEM</h2>
            <div id="aiResult" class="info-text">Тут з'явиться детальний аналіз деталі та розшифровка її кодів від ШІ...</div>
        </div>
    </div>

    <script>
        async function doSearch() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('actionBtn');
            const offersResult = document.getElementById('offersResult');
            const aiResult = document.getElementById('aiResult');

            btn.disabled = true;
            btn.innerText = 'Пошук...';
            offersResult.innerHTML = 'Шукаємо пропозиції...';
            aiResult.innerHTML = 'ШІ аналізує запит...';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                aiResult.innerText = data.ai_text || 'Не вдалося отримати аналітику.';

                offersResult.innerHTML = '';
                if (data.offers && data.offers.length > 0) {
                    data.offers.forEach(offer => {
                        const div = document.createElement('div');
                        div.className = 'offer-item';

                        let stockColor = '#eab308'; 
                        if (offer.stock === 'В наявності') stockColor = '#22c55e';
                        if (offer.stock === 'Немає в наявності') stockColor = '#ef4444';

                        div.innerHTML = `
                            <h3><a href="${offer.link}" target="_blank">${offer.title}</a></h3>
                            <p>${offer.snippet}</p>
                            <div class="meta-row">
                                Ціна: ${offer.price} &nbsp;&nbsp;|&nbsp;&nbsp; 
                                <span style="color: ${stockColor};">● ${offer.stock}</span>
                            </div>
                            <div class="date-text">📅 Публікація: ${offer.date}</div>
                        `;
                        offersResult.appendChild(div);
                    });
                } else {
                    offersResult.innerHTML = 'Нічого не знайдено.';
                }

            } catch (e) {
                offersResult.innerHTML = 'Помилка з\'єднання.';
                aiResult.innerHTML = 'Помилка з\'єднання.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Знайти';
            }
        }
    </script>
</body>
</html>
