<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальний пошук автозапчастин</title>
    <!-- Використовуємо сучасніший та чистіший шрифт без засічок -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121824;
            --panel-main: #1e2640;
            --panel-side: #252131;
            --accent-blue: #3b82f6;
            --accent-orange: #f97316;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --card-bg: #1a2035;
            --border-color: #2e3754;
        }

        body { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        h2 {
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(to right, #3b82f6, #f97316);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-area { 
            width: 100%; 
            max-width: 700px;
            margin: 0 auto 35px auto; 
        }
        
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 14px 18px; 
            background-color: #1e293b;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        button { 
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .loading { 
            display: none; 
            color: var(--accent-blue); 
            font-weight: 500; 
            margin-top: 15px; 
            text-align: center;
            font-size: 0.95rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        .workspace { 
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
            margin-top: 30px; 
        }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; }
        }

        .main-panel { 
            background: var(--panel-main); 
            padding: 25px; 
            border-radius: 14px; 
            border: 1px solid var(--border-color);
        }

        .side-panel { 
            background: var(--panel-side); 
            border: 1px solid rgba(249, 115, 22, 0.3); 
            padding: 25px; 
            border-radius: 14px; 
        }

        h4 {
            margin-top: 0;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .side-panel h4 {
            color: #fdba74;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding-bottom: 10px;
        }

        .part-image { 
            max-width: 100%; 
            max-height: 280px; 
            border-radius: 10px; 
            display: none; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color);
            object-fit: cover;
        }
        
        .offer-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            padding: 16px; 
            margin-top: 14px; 
            transition: border-color 0.2s ease;
        }

        .offer-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .offer-title { 
            font-weight: 600; 
            color: #60a5fa; 
            text-decoration: none; 
            display: inline-block; 
            margin-bottom: 6px; 
            font-size: 1.05rem;
        }

        .offer-title:hover {
            text-decoration: underline;
        }

        .offer-snippet {
            margin: 6px 0 12px 0; 
            font-size: 0.9rem; 
            color: var(--text-muted);
            line-height: 1.4;
        }

        .offer-meta { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.85rem; 
            background: rgba(0, 0, 0, 0.2); 
            padding: 8px 12px; 
            border-radius: 6px; 
        }

        .price-tag { color: #4ade80; font-weight: 600; }
        .date-tag { color: var(--text-muted); }
        
        .ai-output { 
            white-space: pre-line; 
            line-height: 1.6; 
            font-size: 0.95rem; 
            color: #e5e7eb;
        }
    </style>
</head>
<body>
    <h2>Глобальний пошук та аналітика автозапчастин</h2>
    
    <div class="search-area">
        <form id="searchForm" class="search-form">
            <input type="text" id="queryInput" placeholder="Марка, модель, назва деталі..." required>
            <button type="submit">Знайти оголошення та розшифрувати</button>
        </form>
        <div id="loadingText" class="loading">ШІ аналізує коди, а Google збирає міжнародні пропозиції...</div>
    </div>

    <!-- Робоча зона -->
    <div id="resultLayout" class="workspace" style="display: none;">
        
        <!-- ЛІВА КОЛОНКА (Оголошення) -->
        <div class="main-panel">
            <img id="partImage" class="part-image" src="" alt="Фото запчастини">
            <h4>🌐 Знайдені пропозиції (Україна та Європа)</h4>
            <div id="offersContainer"></div>
        </div>

        <!-- ПРАВА КОЛОНКА (Аналітика OEM) -->
        <div class="side-panel">
            <h4>🔧 Аналітика та розшифровка OEM</h4>
            <div id="aiAnalysisContainer" class="ai-output"></div>
        </div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const query = document.getElementById('queryInput').value;
            const loadingText = document.getElementById('loadingText');
            const resultLayout = document.getElementById('resultLayout');
            const offersContainer = document.getElementById('offersContainer');
            const aiAnalysisContainer = document.getElementById('aiAnalysisContainer');
            const partImage = document.getElementById('partImage');

            loadingText.style.display = 'block';
            resultLayout.style.display = 'none';
            partImage.style.display = 'none';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                
                const data = await response.json();
                
                // Виводимо текст ШІ у праву колонку
                aiAnalysisContainer.innerHTML = data.ai_text || "Немає даних для відображення.";

                // Малюємо картки товарів у ліву колонку
                offersContainer.innerHTML = "";
                if(data.offers && data.offers.length > 0) {
                    data.offers.forEach(offer => {
                        const card = document.createElement('div');
                        card.className = 'offer-card';
                        card.innerHTML = `
                            <a class="offer-title" href="${offer.link}" target="_blank">${offer.title}</a>
                            <p class="offer-snippet">${offer.snippet}</p>
                            <div class="offer-meta">
                                <span class="price-tag">💰 Сума: ${offer.price}</span>
                                <span class="date-tag">📅 Публікація: ${offer.date}</span>
                            </div>
                        `;
                        offersContainer.appendChild(card);
                    });
                } else {
                    offersContainer.innerHTML = "<p style='color:var(--text-muted);'>Нічого не знайдено за цим запитом. Спробуйте змінити слова.</p>";
                }

                // Показуємо прев'ю-картинку
                if (data.image_url) {
                    partImage.src = data.image_url;
                    partImage.style.display = 'block';
                }
                
                resultLayout.style.display = 'grid';
            } catch (error) {
                alert('Сталася помилка при отриманні даних.');
            } finally {
                loadingText.style.display = 'none';
            }
        });
    </script>
</body>
</html>
