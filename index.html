<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук та аналітика автозапчастин</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f97316;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
        }

        .search-container {
            width: 100%;
            max-width: 700px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 1px solid #334155;
            border-radius: 8px;
            background-color: #1e293b;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
        }

        button {
            padding: 15px 25px;
            background-color: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 18px;
            color: #f97316;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-content {
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 15px;
            color: #cbd5e1;
        }

        .part-image {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #0f172a;
            display: none;
        }

        .offer-card {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .offer-card h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }

        .offer-card h3 a {
            color: #3b82f6;
            text-decoration: none;
        }

        .offer-card h3 a:hover {
            text-decoration: underline;
        }

        .offer-card p {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #94a3b8;
        }

        .offer-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .offer-date {
            margin-top: 5px;
            font-size: 12px;
            color: #64748b;
        }

        .loader {
            text-align: center;
            color: #94a3b8;
            font-style: italic;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <h1>Пошук та аналітика автозапчастин</h1>

    <div class="search-container">
        <input type="text" id="searchQuery" placeholder="Наприклад: Передній бампер Мерседес 240 1996 р.в.">
        <button id="searchBtn" onclick="startSearch()">Знайти оголошення </button>
    </div>

    <div class="main-layout">
        <div class="panel">
            <h2>🌐 Знайдені пропозиції (Україна та Європа)</h2>
            <img id="partImg" class="part-image" src="" alt="Зображення деталі">
            <div id="offersContainer">
                <div style="color: #64748b;">Введіть запит для пошуку пропозицій на ринку...</div>
            </div>
        </div>

        <div class="panel">
            <h2>🔧 Аналітика та розшифровка OEM</h2>
            <div id="aiContainer" class="ai-content">
                <div style="color: #64748b;">Тут з'явиться детальний аналіз деталі та розшифровка її кодів від ШІ...</div>
            </div>
        </div>
    </div>

    <script>
        async function startSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) return alert('Будь ласка, введіть запит!');

            const btn = document.getElementById('searchBtn');
            const offersContainer = document.getElementById('offersContainer');
            const aiContainer = document.getElementById('aiContainer');
            const partImg = document.getElementById('partImg');

            // Вмикаємо режим завантаження
            btn.disabled = true;
            btn.innerText = 'Пошук та аналіз...';
            offersContainer.innerHTML = '<div class="loader">Шукаємо найкращі пропозиції на шротах...</div>';
            aiContainer.innerHTML = '<div class="loader">ШІ аналізує марку, модель та коди...</div>';
            partImg.style.display = 'none';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                // 1. Виведення аналітики ШІ
                aiContainer.innerText = data.ai_text || 'Не вдалося отримати аналітику.';

                // 2. Виведення картинки
                if (data.image_url) {
                    partImg.src = data.image_url;
                    partImg.style.display = 'block';
                }

                // 3. Виведення пропозицій та їх наявності
                offersContainer.innerHTML = '';
                if (data.offers && data.offers.length > 0) {
                    data.offers.forEach(offer => {
                        const card = document.createElement('div');
                        card.className = 'offer-card';

                        // Визначаємо колір індикатора наявності
                        let stockColor = '#eab308'; // Жовтий за дефолтом (Під замовлення)
                        if (offer.stock === 'В наявності') {
                            stockColor = '#22c55e'; // Зелений
                        } else if (offer.stock === 'Немає в наявності') {
                            stockColor = '#ef4444'; // Червоний
                        }

                        card.innerHTML = `
                            <h3><a href="${offer.link}" target="_blank">${offer.title}</a></h3>
                            <p>${offer.snippet}</p>
                            <div class="offer-meta">
                                <span style="color: #f97316;">Ціна: ${offer.price}</span>
                                <span class="status-badge" style="color: ${stockColor};">● ${offer.stock}</span>
                            </div>
                            <div class="offer-date">📅 Публікація: ${offer.date}</div>
                        `;
                        offersContainer.appendChild(card);
                    });
                } else {
                    offersContainer.innerHTML = '<div style="color: #ef4444;">Нічого не знайдено за цим запитом. Спробуйте змінити слова.</div>';
                }

            } catch (error) {
                console.error(error);
                offersContainer.innerHTML = '<div style="color: #ef4444;">Помилка при отриманні даних з сервера.</div>';
                aiContainer.innerHTML = '<div style="color: #ef4444;">Не вдалося з'єднатися з сервером аналітики.</div>';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Знайти оголошення та розшифрувати';
            }
        }
    </script>
</body>
</html>
