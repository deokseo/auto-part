<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Європейський Пошук Запчастин</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #141b2d;
            --accent: #2563eb;
            --text: #f1f5f9;
            --green: #10b981;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 2rem;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            background: #1e293b;
            padding: 6px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 35px;
        }
        input {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #232d45;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .card-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 8px;
            background: #ffffff;
            padding: 5px;
        }
        .card-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #64748b;
        }
        .source {
            background: #1e293b;
            color: #38bdf8;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .country-badge {
            background: #2e3b52;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 5px;
        }
        .title {
            color: #f8fafc;
            font-size: 16px;
            text-decoration: none;
            font-weight: 600;
            line-height: 1.4;
        }
        .title:hover { text-decoration: underline; color: #38bdf8; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }
        .price {
            font-size: 18px;
            color: var(--green);
            font-weight: 700;
        }
        .link-btn {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .link-btn:hover { background: #059669; }
        .status { text-align: center; color: #475569; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 Пан-Європейський Пошук Запчастин</h1>
    
    <div class="search-box">
        <input type="text" id="targetQuery" placeholder="Введіть запит або OEM номер...">
        <button onclick="startSearch()" id="searchButton">Шукати</button>
    </div>

    <div class="grid" id="offersGrid">
        <p class="status">Очікування введення деталі...</p>
    </div>
</div>

<script>
    async function startSearch() {
        const query = document.getElementById('targetQuery').value.trim();
        if (!query) return;
        
        const grid = document.getElementById('offersGrid');
        const btn = document.getElementById('searchButton');
        
        btn.disabled = true;
        btn.textContent = 'Обробка...';
        grid.innerHTML = '<p class="status">Сканування та конвертація валют в грн за актуальним курсом...</p>';
        
        try {
            const response = await fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query })
            });
            const data = await response.json();
            
            grid.innerHTML = '';
            
            if (!data.offers || data.offers.length === 0) {
                grid.innerHTML = '<p class="status">Нічого не знайдено.</p>';
                btn.disabled = false; btn.textContent = 'Шукати';
                return;
            }
            
            data.offers.forEach(item => {
                const imgTag = item.image ? `<img src="${item.image}" class="card-img" alt="part">` : `<div class="card-img" style="background: #1e293b;"></div>`;
                
                grid.innerHTML += `
                    <div class="card">
                        ${imgTag}
                        <div class="card-info">
                            <div class="card-meta">
                                <div>
                                    <span class="country-badge">${item.country || '🏳️ UA'}</span>
                                    <span class="source">${item.source}</span>
                                </div>
                                <span style="color: #6ee7b7;">✓ Перевірено</span>
                            </div>
                            <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                            <div class="card-footer">
                                <span class="price">${item.price}</span>
                                <a href="${item.link}" target="_blank" class="link-btn">Відкрити товар →</a>
                            </div>
                        </div>
                    </div>
                `;
            });
            
        } catch (e) {
            grid.innerHTML = '<p class="status" style="color: #ef4444;">Помилка з\'єднання з сервером.</p>';
        }
        
        btn.disabled = false;
        btn.textContent = 'Шукати';
    }
</script>

</body>
</html>
